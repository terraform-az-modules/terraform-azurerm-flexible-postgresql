name: Terraform Azure Flexible PostgreSQL

intro: |-
  With our comprehensive DevOps toolkit - streamline operations, automate workflows, enhance collaboration and deploy with confidence.

badges_text: "Latest Release | tfsec | License | Changelog"

about: |-
  Terraform module to create and manage Flexible PostgreSQL on Azure.

license: "APACHE"

github_repo: terraform-az-modules/terraform-azurerm-flexible-postgresql

badges:
  - name: "Terraform"
    image: "https://img.shields.io/badge/Terraform-v1.10.0-green"
    url: "https://www.terraform.io"

  - name: "Licence"
    image: "https://img.shields.io/badge/License-APACHE-blue.svg"
    url: "LICENSE.md"

prerequisites:
  - name: Terraform
    url: https://learn.hashicorp.com/terraform/getting-started/install.html
    version: ">= 1.10.0"

providers:
  - name: azurerm
    url: https://registry.terraform.io/providers/hashicorp/azurerm/latest
    version: ">= 4.0"

description: |-
  Terraform module to create and manage Flexible PostgreSQL on Azure.

usage: |-
  ### Example

  ```hcl
  module "resource_group" {
    source      = "terraform-az-modules/resource-group/azurerm"
    version     = "1.0.3"
    name        = "core"
    environment = "dev"
    location    = "centralindia"
    label_order = ["name", "environment", "location"]
  }
  ```
